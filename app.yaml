runtime: python312
entrypoint: gunicorn -b :$PORT docexport_app:app

# Keep the app running in the free tier of Google App Engine
instance_class: F1
automatic_scaling:
  max_instances: 1  # Caps the total number of instances to guaranteed this uses free tier only
  min_instances: 0  # Shut down when not in use

# Make Google App Engine serve static files and robots.txt instead of having to load my Python program
handlers:
  - url: /robots\.txt
    static_files: static/robots.txt
    upload: static/robots\.txt

  # Also let GAE serve any other files in /static
  - url: /static
    static_dir: static

  # Other routes go to Python
  - url: /.*
    script: auto
